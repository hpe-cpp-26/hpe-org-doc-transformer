name: Deploy doc-query

on:
  push:
    branches: [main]
    paths:
      - "doc-query/**"
  workflow_dispatch:

env:
  DEPLOY_DIR: /home/${{ secrets.VM_USERNAME }}/hpe-org-doc-transformer
  SERVICE_DIR: /home/${{ secrets.VM_USERNAME }}/hpe-org-doc-transformer/doc-query

jobs:
  check:
    name: Lint & Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: doc-query/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: doc-query/frontend
        run: npm ci

      - name: Lint frontend
        working-directory: doc-query/frontend
        run: npm run lint

      - name: Build frontend (verify production build works)
        working-directory: doc-query/frontend
        run: npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: doc-query
        run: pip install -r requirements.txt

      - name: Python syntax check
        working-directory: doc-query
        run: python -m py_compile app/main.py

  deploy:
    name: Deploy to Azure VM
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VM_SSH_PORT || 22 }}
          script: |
            set -e

            echo "Navigating to project directory..."
            cd ${{ env.DEPLOY_DIR }}

            echo "Pulling latest changes..."
            git pull origin main

            echo "Navigating to doc-query..."
            cd doc-query

            echo "Building and restarting changed containers..."
            docker compose up -d --build

            echo "Cleaning up dangling images..."
            docker image prune -f

            echo "Verifying containers are running..."
            docker compose ps

            echo "Deployment complete!"
