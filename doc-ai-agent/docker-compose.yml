services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: doc_ai
    ports:
      - "5432:5432"
    volumes:
      - doc_ai_postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d doc_ai"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  doc_ai_postgres_data:
