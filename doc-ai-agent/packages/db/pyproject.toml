[project]
name = "db"
version = "0.1.0"
description = "Shared PostgreSQL + pgvector access helpers"
readme = "README.md"
authors = [
    { name = "Dharshan S Kotian", email = "dcodecraft@gmail.com" }
]
requires-python = ">=3.14"
dependencies = [
    "psycopg[binary]>=3.2,<4",
]

[build-system]
requires = ["uv_build>=0.10.12,<0.11.0"]
build-backend = "uv_build"